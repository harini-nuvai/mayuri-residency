services:
  # ── Backend API (Express + Node.js) ──────────────────────────────────
  - type: web
    name: mayuri-residency-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mayuri-residency-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://mayuri-residency-frontend.onrender.com
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: NOTIFY_EMAIL
        sync: false

  # ── Frontend (React + Vite static site) ──────────────────────────────
  - type: web
    name: mayuri-residency-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://mayuri-residency-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # ── PostgreSQL Database ───────────────────────────────────────────────
  - name: mayuri-residency-db
    plan: free
    databaseName: mayuri_residency
    user: mayuri_admin
